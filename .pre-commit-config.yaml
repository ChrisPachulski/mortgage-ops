# .pre-commit-config.yaml
# Local hook runner. Mirrors the CI gate (.github/workflows/ci.yml) — the same
# four checks fire in the same order. Re-run after editing pyproject.toml dev
# deps; bump `rev:` here in lockstep with the dev-deps in pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.13.3
          - python-dateutil>=2.9.0
          - pyyaml>=6.0.2
          - pytest>=9.0
          - tiktoken>=0.7,<1.0
        args: [--strict]
        # mypy hook runs on changed files only by default — CI catches the rest.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        files: ^data/reference/.*\.yml$

  - repo: local
    hooks:
      - id: block-user-layer
        name: Block commits to user-layer files (DATA_CONTRACT.md)
        entry: uv run python scripts/hooks/block-user-layer.py
        language: system
        stages: [pre-commit]
        always_run: true
        pass_filenames: true
