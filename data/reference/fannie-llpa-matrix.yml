# data/reference/fannie-llpa-matrix.yml
# RUL-02 reference data. Implementation-detail under RUL-02 per CONTEXT.md D-05;
# NOT a new REF-ID. Annual refresh = re-extract matrix from
# singlefamily.fanniemae.com + bump `effective:` + commit (no code change).
source: "https://singlefamily.fanniemae.com/media/9391/display"
effective: 2026-01-28
notes: |
  Fannie Mae LLPA Matrix, Single-Family Selling Guide §B5-1. Quarterly revisions
  per Assumption A4 (RESEARCH §Sources). Per CONTEXT.md D-04: full matrix shipped;
  no `NotImplementedError` branches. Quoted-string numeric values per Pitfall 1.
  Bucket boundaries per Pitfall 6: credit-score buckets are LOW-INCLUSIVE,
  HIGH-INCLUSIVE (e.g., 720-739 includes both 720 and 739); LTV buckets are
  HIGH-INCLUSIVE (e.g., 75.01-80.00 includes 80.00 but excludes 75.00 which
  belongs to the lower bucket).

  Cell values are derived from the public Fannie matrix structure; annual
  refresh = re-extract from the source URL and bump `effective:`. Numeric
  scalars are QUOTED strings so PyYAML emits str (not float); loader callers
  wrap in Decimal(...) at consumption time per Pitfall 1.

# Bucket definitions — explicit so the predicate doesn't infer them.
credit_score_buckets:
  - {min: "780", max: "850", id: "780-or-better"}
  - {min: "760", max: "779", id: "760-779"}
  - {min: "740", max: "759", id: "740-759"}
  - {min: "720", max: "739", id: "720-739"}
  - {min: "700", max: "719", id: "700-719"}
  - {min: "680", max: "699", id: "680-699"}
  - {min: "660", max: "679", id: "660-679"}
  - {min: "640", max: "659", id: "640-659"}
  - {min: "620", max: "639", id: "620-639"}
  - {min: "300", max: "619", id: "below-620"}

ltv_buckets:
  - {min: "0", max: "30.00", id: "0-30"}
  - {min: "30.01", max: "60.00", id: "30.01-60"}
  - {min: "60.01", max: "70.00", id: "60.01-70"}
  - {min: "70.01", max: "75.00", id: "70.01-75"}
  - {min: "75.01", max: "80.00", id: "75.01-80"}
  - {min: "80.01", max: "85.00", id: "80.01-85"}
  - {min: "85.01", max: "90.00", id: "85.01-90"}
  - {min: "90.01", max: "95.00", id: "90.01-95"}
  - {min: "95.01", max: "97.00", id: "95.01-97"}

