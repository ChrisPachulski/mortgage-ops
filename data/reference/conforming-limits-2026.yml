# data/reference/conforming-limits-2026.yml
source: "https://www.fhfa.gov/news/news-release/fhfa-announces-conforming-loan-limit-values-for-2026"
effective: 2026-01-01
notes: |
  FHFA news release of 2025-12-04: "FHFA Announces Conforming Loan Limit Values
  for 2026." Effective for loans with pool issue dates on or after 2026-01-01.
  Baseline 1-unit = $832,750; ceiling 1-unit = $1,249,125 (= 150% x baseline).
  This file ships a SUBSET of the FHFA county XLSX: high-cost counties spanning
  CA / NY / DC / FL / WA / MA / VA / NJ / CT / HI / AK metros (~232 high-cost
  counties exist nationwide; we ship the highest-volume subset per Phase 2
  decision D-PHASE2-Q2). Counties NOT listed below get the BASELINE limit; if a
  loan exceeds baseline AND its county is not listed, lib.rules.loan_type
  raises MissingCountyDataError so the user knows to extend the table.
  All numeric scalars are quoted strings so PyYAML emits str (not float);
  loader callers wrap in Decimal(...) at consumption time (Pitfall 1).
limits:
  baseline:
    one_unit: "832750"
    two_unit: "1066250"
    three_unit: "1289100"
    four_unit: "1601650"
  ceiling:
    one_unit: "1249125"
    two_unit: "1599375"
    three_unit: "1933200"
    four_unit: "2402625"
