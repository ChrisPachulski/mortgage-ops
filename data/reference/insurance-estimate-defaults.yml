# data/reference/insurance-estimate-defaults.yml
source: "https://content.naic.org/article/naic-releases-homeowners-insurance-report-2022"
effective: 2025-05-21
notes: |
  Composite reference data for the homeowners-insurance fallback (REF-10).
  Three independent lookup surfaces in one file, mirroring `va-funding-fees.yml`
  multi-section precedent:

    1. state_base_annual_premium: 51 rows (50 states + DC).
       - 49 states + DC sourced from NAIC Homeowners Insurance Report
         "Data for 2022, published 2025-05-21".
       - CA + TX sourced from III (Insurance Information Institute) state
         averages because NAIC's 2022-data report EXCLUDES these two states
         (separate submission channel — RESEARCH Pitfall 5). Per-row `notes:`
         field documents the per-state source mix.
    2. flood_zone_multipliers: 5 rows (X, A, AE, V, unknown) — MULTIPLICATIVE.
       Private-market homeowners-policy flood-uplift heuristic, NOT a citable
       FEMA NFIP rate. FEMA Risk Rating 2.0 (effective 2021-04-01) decoupled
       NFIP premium from FIRM zone (RESEARCH Pitfall 6), so a single
       FIRM-zone-keyed FEMA rate no longer exists. These multipliers
       approximate the cost uplift on homeowners policies in flood-prone
       zones based on representative private-market carrier filings.
       v1.1 caller (lib/property_analysis.py) ALWAYS passes flood_zone=None
       because PropertyListing has NO flood_zone field (RESEARCH correction
       #1), so only the `unknown` row (multiplier 1.15) ever fires from
       Phase 14 in v1.1. The X/A/AE/V rows are forward-compatible scaffolding
       for v1.2 when listing extraction may include flood-zone data.
    3. earthquake_state_addons: 3 rows (CA, OR, WA) — ADDITIVE flat $.
       CA sourced from California Earthquake Authority published averages;
       OR + WA sourced from PNW private-market carrier surveys (CEA does
       not cover non-CA states). CEA publishes earthquake premium per $1000
       coverage, not as a flat $ (RESEARCH Pitfall 7); the flat values below
       approximate a ~$500-700k home coverage baseline. High-value or
       low-value homes will be systematically mispriced — v1.1 design
       tradeoff per CONTEXT D-16-INS-03. Other states get NO row → silent
       Decimal("0.00") in the predicate (D-16-INS-03 Claude's-Discretion).

  Composition formula (applied in `lib/rules/insurance.py:lookup_default`):
      annual = state_base * flood_zone_multiplier + earthquake_state_addon
  Quantization happens ONCE at the predicate boundary via
  `lib.money.quantize_cents` (RESEARCH Pitfall 6). The Phase 14 wire-in
  (deferred to Plan 16-03) divides by 12 + re-quantizes for monthly display,
  mirroring the FHA MIP wire-in convention at lib/property_analysis.py:672.

  Staleness expectation: `_check_staleness` warns if effective > 12 months
  old. As of 2026-05-22 this YAML's effective=2025-05-21 IS older than
  12 months — StaleReferenceWarning WILL fire on first import (CORRECT
  behavior per Phase 2 D-02 precedent). Re-verify annually against the
  latest NAIC report republication.

  Money discipline (CLAUDE.md non-negotiable + Phase 2 D-02): every numeric
  scalar below is a QUOTED STRING. Consumers wrap in `Decimal(str)` at the
  boundary (`lib/rules/insurance.py:lookup_default`). Only the `effective:`
  scalar at the top of this file is an unquoted YAML date (required by
  `_loader.py:80-85` type-check for `_check_staleness`).
