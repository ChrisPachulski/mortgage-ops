# data/reference/va-funding-fees.yml
source: "https://benefits.va.gov/WARMS/docs/admin26/m26-07/m26-7-chapter8-borrower-fees-and-charges-and-the-va-funding-fee.pdf"
effective: 2026-05-23
notes: |
  VA Lender Handbook M26-7 Chapter 8 — Borrower Fees, Charges, and the VA Funding
  Fee. The underlying fee table took effect 2023-04-07 (the date VA last
  republished the fee schedule) and has NOT been republished since. Per 38 USC
  §3729 and the Blue Water Navy Vietnam Veterans Act.

  2026-05-23 REFRESH NOTE: Re-verified 2026-05-23 against va.gov funding-fee
  landing page (https://www.va.gov/housing-assistance/home-loans/funding-fee-
  and-closing-costs/, page last updated 2026-01-15) — schedule still references
  the 2023-04-07 effective date and pinned percentages are UNCHANGED. Statute
  has not been re-enacted; no new VA Circular changes these rates as of the
  refresh date. The `effective:` field is bumped to 2026-05-23 to record the
  annual re-verification audit (the policy itself has not changed since
  2023-04-07).

  Fee structure:
    - Purchase: fee % depends on (first_use vs subsequent_use, down_payment_pct
      band: 0..<5 / 5..<10 / >=10). Down-payment tier is meaningful for
      purchase only.
    - Cash-out refi: FLAT fees per M26-7 Chapter 8 — first-use 2.15% /
      subsequent-use 3.30% — INDEPENDENT of down_payment_pct. (Cash-out refis
      convert equity into cash; there is no "down payment" in the traditional
      sense.) Fix for BL-02 (02-REVIEW.md): previously cash-out shared the
      purchase down-payment-banded table, which silently understated the fee
      for any cash-out refi with a non-zero "down payment" parameter.
    - IRRRL (Interest Rate Reduction Refi Loan, "streamline"): flat 0.50%
      regardless of use-count or down-payment.
    - Manufactured home (NOT on permanent foundation): flat 1.00%.
    - Loan assumption: flat 0.50%.
    - Veterans receiving VA disability compensation are EXEMPT (fee = $0).

  Down-payment bands are EXCLUSIVE of upper bound: 0..<5 means "less than 5%",
  5..<10 means "5% up to but not including 10%", >=10 means "10% or greater".
purchase:
  # Purchase-only down-payment-banded fee table per M26-7 Ch 8.
  # Each row: down_payment_band, first_use_pct, subsequent_use_pct
  - {down_payment_min: "0.00", down_payment_max: "0.05", first_use_pct: "0.0215", subsequent_use_pct: "0.0330"}
  - {down_payment_min: "0.05", down_payment_max: "0.10", first_use_pct: "0.0150", subsequent_use_pct: "0.0150"}
  - {down_payment_min: "0.10", down_payment_max: "1.00", first_use_pct: "0.0125", subsequent_use_pct: "0.0125"}
flat_fees:
  irrrl: "0.0050"                # IRRRL streamline — flat regardless of use-count or down-payment
  manufactured_home_non_permanent: "0.0100"
  loan_assumption: "0.0050"
  cash_out_first_use: "0.0215"        # M26-7 Ch 8 — flat, no down-payment tier
  cash_out_subsequent_use: "0.0330"   # M26-7 Ch 8 — flat, no down-payment tier
exemption:
  va_disability_compensation_recipient: true   # is_exempt=True → fee = $0.00
