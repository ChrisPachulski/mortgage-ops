# data/reference/fha-limits-2026.yml
source: "https://www.hud.gov/sites/dfiles/hudclips/documents/2025-23hsgml.pdf"
effective: 2026-01-01
notes: |
  HUD Mortgagee Letter 2025-23 — 2026 FHA forward-mortgage limits. Effective for
  FHA case numbers assigned on or after 2026-01-01. Floor 1-unit = $541,287
  (= 65% × FHFA baseline of $832,750); ceiling 1-unit = $1,249,125 (matches
  conforming ceiling). FHA limits are computed per MSA (not per county) but HUD
  publishes per-county tables; we ship the same county-key shape as REF-01 for
  symmetry. Counties NOT listed get the FLOOR limit. Per Phase 2 decision
  D-PHASE2-Q2: subset of high-cost counties shipped (CA / NY / DC / MA / NJ /
  HI / AK metros); unlisted high-cost counties → MissingCountyDataError.
  This unlisted-county semantic is enforced in lib.rules.loan_type._county_limit_fha
  (BL-01 / BL-05 fix in 02-REVIEW.md): the helper raises MissingCountyDataError
  rather than silently returning the floor, matching this notes block. If you
  edit one side you MUST edit the other — these two artifacts must agree.

  BL-04 (02-REVIEW.md) data-shape note: high_cost_counties entries below carry
  ONLY `one_unit`. The floor + ceiling blocks declare two/three/four_unit
  values, but per-county multi-unit data is NOT shipped because v1 only supports
  unit_count=1 (lib.rules.loan_type.classify rejects unit_count > 1). The
  _county_limit_fha helper asserts unit_key == "one_unit" so any future
  relaxation surfaces a clear NotImplementedError; before adding multi-unit
  support, fill in two_unit / three_unit / four_unit from HUD's published
  county tables.
limits:
