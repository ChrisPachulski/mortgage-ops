  # FICO 740-759 row (Pachulski-household representative band)
  - {fico_min: "740", fico_max: "759", ltv_min: "0.80", ltv_max: "0.85", annual_rate: "0.0020", fico_band_label: "740-759", ltv_band_label: "80-85"}
