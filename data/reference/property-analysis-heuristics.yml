# data/reference/property-analysis-heuristics.yml
source: "https://www.mgic.com/rates/rate-cards"
effective: 2024-03-04
notes: |
  MGIC Rate Card "Standard MI" (Borrower-Paid Monthly Premium) — abridged 4x4
  BPMI rate schedule per CONTEXT D-16-PMI-01. Industry-published rate card;
  NOT a regulatory predicate. Reports flag every PMI value as estimate via
  `PMI-RATE-ESTIMATED-MGIC-{ltv_band}-{fico_band}` in `eligible_reasons`.

  Design rationale (D-16-PMI-01): Phase 16 v1.1 ships an abridged 4x4 subset
  (16 cells: 4 FICO bands x 4 LTV bands). The full MGIC 8x7 schedule (56 cells
  including 620-679 FICO tiers and finer LTV buckets) is deferred to v2 per
  ROADMAP backlog. The abridged subset covers the Pachulski-household
  representative bands (740-759 / 760+) and the boundary cases at LTV 80-85
  and FICO 700-719.

  Boundary convention (CRITICAL — RESEARCH Pitfall 10 / PATTERNS Boundary
  Convention Divergence): EXCLUSIVE-LOWER / INCLUSIVE-UPPER for ALL rows.
  There is NO `ltv_min == 0.00` special-case (unlike `data/reference/fha-mip-rates.yml`).
  LTV exactly 0.80 falls THROUGH to the capped-fallback row to match the
  Phase 14 trigger at `lib/property_analysis.py:652` which reads
  `provisional_ltv > Decimal("0.80")`. The first row covers `0.80 < ltv <= 0.85`.

  Capped-fallback policy (D-16-PMI-02): out-of-band combinations — FICO < 700,
  LTV > 97, LTV <= 80 — return the worst-cell rate (FICO 700-719 x LTV 95-97 ->
  0.0078). The reason tag changes to `PMI-RATE-CAPPED-MGIC-ABRIDGED-{fico}-{ltv}`
  so reports can distinguish in-band estimates from capped-fallback estimates.

  Source pinning: MGIC Rate Card "Standard MI" published bulletin
  (form 71-43345 series); rates are representative published BPMI monthly
  premiums for borrowers with standard 25% MI coverage. Re-verify annually
  against the latest MGIC bulletin republication.

  Staleness expectation: `_check_staleness` (lib/rules/_loader.py:90) warns if
  effective > 12 months old. As of 2026-05-22 this YAML's effective=2024-03-04
  IS older than 12 months — StaleReferenceWarning WILL fire on first import
  (CORRECT behavior per Phase 2 D-02 precedent: "warnings firing on
  still-current data is expected when the source hasn't republished").
  Re-verify annually that no new MGIC bulletin has changed these rates.

  Money discipline (CLAUDE.md non-negotiable + Phase 2 D-02): every numeric
  scalar below is a QUOTED STRING. Consumers wrap in `Decimal(str)` at the
  boundary (`lib/rules/pmi.py:lookup_rate`). Only the `effective:` scalar at
  the top of this file is an unquoted YAML date (required by `_loader.py:80-85`
  type-check for `_check_staleness`).
pmi_annual_rate_table:
  # FICO 760+ row
  - {fico_min: "760", fico_max: "850", ltv_min: "0.80", ltv_max: "0.85", annual_rate: "0.0019", fico_band_label: "760+", ltv_band_label: "80-85"}
  - {fico_min: "760", fico_max: "850", ltv_min: "0.85", ltv_max: "0.90", annual_rate: "0.0023", fico_band_label: "760+", ltv_band_label: "85-90"}
  - {fico_min: "760", fico_max: "850", ltv_min: "0.90", ltv_max: "0.95", annual_rate: "0.0028", fico_band_label: "760+", ltv_band_label: "90-95"}
  - {fico_min: "760", fico_max: "850", ltv_min: "0.95", ltv_max: "0.97", annual_rate: "0.0034", fico_band_label: "760+", ltv_band_label: "95-97"}
  # FICO 740-759 row (Pachulski-household representative band)
  - {fico_min: "740", fico_max: "759", ltv_min: "0.80", ltv_max: "0.85", annual_rate: "0.0023", fico_band_label: "740-759", ltv_band_label: "80-85"}
