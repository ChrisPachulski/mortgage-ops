  - {fico_min: "700", fico_max: "719", ltv_min: "0.95", ltv_max: "0.97", annual_rate: "0.0079", fico_band_label: "700-719", ltv_band_label: "95-97"}
pmi_capped_fallback:
  # D-16-PMI-02: out-of-band combos cap at worst-cell rate (matches the
  # FICO 700-719 x LTV 95-97 row above exactly). Out-of-band cases include:
  # FICO < 700, LTV > 0.97, LTV <= 0.80 (boundary convention divergence —
  # LTV exactly 0.80 hits the capped-fallback per Phase 14 trigger semantics).
  annual_rate: "0.0079"
  fico_band_label: "700-719"
  ltv_band_label: "95-97"
